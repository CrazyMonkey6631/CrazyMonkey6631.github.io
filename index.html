<!DOCTYPE html>
<html>
<head>
    <title>CrazyMonkey's Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            /* YOUR BACKGROUND IMAGE */
            background-image: url('background.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* RAINBOW HEADER */
        header {
            padding: 25px;
            text-align: center;
            color: white;
            font-size: 24px;
            background: linear-gradient(
                90deg,
                red,
                orange,
                yellow,
                green,
                blue,
                indigo,
                violet
            );
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* POST BOX */
        .post {
            background: rgba(255, 255, 255, 0.85);
            width: 85%;
            max-width: 600px;
            margin: 25px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        }

        h1, h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>CrazyMonkey's Blog</h1>
    <p>Welcome to my colorful world!</p>
</header>

<div class="post">
    <h2>My First Post</h2>
    <p>This is my first post.</p>
</div>

</body>
</html>
